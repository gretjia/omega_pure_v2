# R-010: Loss 函数变更触发全栈检查
id: R-010
name: "Warn when Loss function code is modified — paradigm shift checklist"
source_incidents: [C-043, C-051, C-054, C-059]
axiom: "Ω2"

trigger:
  event: PostToolUse
  matcher: "Edit|Write"
  file_glob: "*core*.py|*loss*.py|train.py|gcp/train.py"

check:
  type: grep
  # 检测 Loss 相关代码修改
  pattern: "class.*Loss|def.*loss|criterion\\s*=|loss_fn\\s*=|lambda_s\\s*=|huber_delta\\s*="
  scope: content

enforcement: warn
message: |
  ⚠️ PARADIGM SHIFT DETECTED — C-054 原子清单:
  1. grep -r 全栈受影响变量 (TARGET_STD, scale factors, etc.)
  2. 重标定 λ_s (量纲匹配新 Loss 量级 — C-043: IC≈0.05 vs Softmax≈10 需 200x)
  3. 重建 Docker + canary (C-053: Docker 构建时间必须在代码修复之后)
  4. E0-E1 后独立烟测 (C-052: 不可跑完 20 epoch 才发现脑死亡)
  5. 更新 spec + HPO 搜索范围
  6. 同步推理/回测脚本 (C-049: Train-Serve Skew)
  7. 检查 ETL 输出单位 (C-059: BP 还是 raw decimal?)

stats:
  created: "2026-04-03"
  times_triggered: 1
  times_bypassed: 0
  false_positives: 0
  last_triggered: "2026-04-04"
