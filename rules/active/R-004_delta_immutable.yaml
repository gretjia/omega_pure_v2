# R-004: delta 物理常数不可修改
id: R-004
name: "Block modification of delta (Layer 1 physical constant = 0.5)"
source_incidents: []
axiom: "Ω1"

trigger:
  event: PreToolUse
  matcher: "Edit|Write"
  file_glob: "*core*.py|*axiom*.py"

check:
  type: grep
  pattern: "delta\\s*=\\s*(?!0\\.5)[\\d.]+"
  scope: content

enforcement: block
message: |
  AXIOM VIOLATION: delta 必须 = 0.5 (Layer 1 物理常数, 平方根法则指数)。
  此常数不可修改、不可设为可学习参数。

