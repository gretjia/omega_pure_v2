# Phase 14 Step 1: Phase 6 Oracle Test — T4 GPU (CPU too slow for 320-token attention)
# Phase 6 T29: window=(32,10), hd=64, IC Loss
# Step 0 already completed: Mean=6.93, Std=189.60, Kurt=2006
workerPoolSpecs:
- machineSpec:
    machineType: n1-standard-4
    acceleratorType: NVIDIA_TESLA_T4
    acceleratorCount: 1
  replicaCount: 1
  diskSpec:
    bootDiskType: pd-standard
    bootDiskSizeGb: 100
  containerSpec:
    imageUri: us-central1-docker.pkg.dev/gen-lang-client-0250995579/omega-training/omega-tib:phase13-v2
    command:
    - bash
    - -c
    - |
      set -e
      echo "=== Phase 14 Step 1: Phase 6 Oracle Test (T4 GPU) ==="

      gcloud storage cp gs://omega-pure-data/scripts/phase6_oracle_test.py /app/phase6_oracle_test.py

      PYTHONUNBUFFERED=1 python3 /app/phase6_oracle_test.py \
        --checkpoint gs://omega-pure-data/checkpoints/phase6_icloss/trial_29/best.pt \
        --shard_dir gs://omega-pure-data/wds_shards_v3_full \
        --output_dir /gcs/omega-pure-data/phase14_results \
        --window_size_t 32 \
        --window_size_s 10 \
        --hidden_dim 64 \
        --batch_size 512 \
        --skip_step0

      echo "=== Results at gs://omega-pure-data/phase14_results/phase14_step0_step1.json ==="
scheduling:
  strategy: ON_DEMAND
