# Vanguard Protocol: T16 Full Convergence Run (INS-017)
# A100 40GB SPOT + TF32 + gcsfuse (no local copy — disk limit)
# 20 epochs × 5000 steps = 100K steps
# Cost: ~$5-8 (A100 Spot), Time: ~5-7h

workerPoolSpecs:
  - machineSpec:
      machineType: a2-highgpu-1g
      acceleratorType: NVIDIA_TESLA_A100
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: us-central1-docker.pkg.dev/gen-lang-client-0250995579/omega-training/omega-tib:v7-vanguard
      command:
        - python3
      args:
        - /app/train.py
        - --shard_dir=/gcs/omega-pure-data/wds_shards_v3_full
        - --output_dir=/gcs/omega-pure-data/checkpoints/vanguard_t16
        - --epochs=20
        - --steps_per_epoch=5000
        - --batch_size=256
        - --lr=0.000377207
        - --lambda_s=0.00000684841
        - --warmup_epochs=5
        - --hidden_dim=128
        - --window_size_t=16
        - --window_size_s=10
        - --coarse_graining_factor=1
        - --mask_prob=0.0
        - --grad_clip=1.0
        - --macro_window=160
        - --max_val_steps=200
        - --early_stop_fvu=0
        - --early_stop_patience=99
        - --ckpt_every_n_steps=500
        - --num_workers=0
scheduling:
  strategy: SPOT
  restartJobOnWorkerRestart: true
