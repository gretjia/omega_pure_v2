# Phase 13 Full Training — IC Loss + AttentionPooling + Pre-LN Residual
# Architect GREEN LIGHT 2026-04-04 (V3 Joint Arbitration)
# Config: T4 Spot, pipe mode (no staging), ~10h, ~$2-3
# Docker: phase13-v2 (Crucible PASS: IC_loss=-0.875, IC=0.88)
workerPoolSpecs:
- machineSpec:
    machineType: n1-standard-8
    acceleratorType: NVIDIA_TESLA_T4
    acceleratorCount: 1
  replicaCount: 1
  diskSpec:
    bootDiskType: pd-balanced
    bootDiskSizeGb: 100
  containerSpec:
    imageUri: us-central1-docker.pkg.dev/gen-lang-client-0250995579/omega-training/omega-tib:phase13-v2
    command:
    - bash
    - -c
    - |
      set -e
      echo "=== Phase 13: IC Loss + AttentionPooling + Pre-LN Residual ==="
      echo "Architect GREEN LIGHT 2026-04-04 (V3 Joint Arbitration)"
      echo "Phase 13 = Epoch 0 (all historical baselines invalidated)"
      echo "Scope: Intraday TWAP/VWAP execution friction (0.64-day receptive field)"
      echo ""
      echo "Frozen config:"
      echo "  Loss: IC Loss (batch-level Pearson, lambda_s=0)"
      echo "  Target: Pure BP (no leaky blinding, no static centering)"
      echo "  Topology: AttentionPooling + Pre-LN Residual"
      echo "  Regularization: lambda_s=0 (MDL suspended)"
      echo "  I/O: Pipe mode (streaming from GCS, no staging)"

      echo "=== Phase 13 Training (15 epochs x 5000 steps) ==="
      PYTHONUNBUFFERED=1 python3 /app/train.py \
        --shard_dir=gs://omega-pure-data/wds_shards_v3_full \
        --output_dir=/gcs/omega-pure-data/checkpoints/phase13_v1 \
        --hidden_dim=64 \
        --window_size_t=32 \
        --window_size_s=10 \
        --lr=3e-4 \
        --lambda_s=0 \
        --batch_size=256 \
        --coarse_graining_factor=1 \
        --epochs=15 \
        --steps_per_epoch=5000 \
        --num_workers=4 \
        --ckpt_every_n_steps=1000 \
        --no_amp \
        --grad_clip=1.0 \
        --mask_prob=0.0 \
        --resume

      echo "=== Phase 13 Training Complete ==="
      echo "Checkpoints: gs://omega-pure-data/checkpoints/phase13_v1/"
      echo "Next: Post-Flight evaluation with ETL v4 shards (per-date cross-sectional)"
scheduling:
  strategy: SPOT
