workerPoolSpecs:
- machineSpec:
    machineType: g2-standard-8
    acceleratorType: NVIDIA_L4
    acceleratorCount: 1
  replicaCount: 1
  diskSpec:
    bootDiskType: pd-ssd
    bootDiskSizeGb: 800
  containerSpec:
    imageUri: img
    command:
    - bash
    - -c
    args:
    - "set -e\necho \"Staging shards to local SSD via gcloud storage cp (parallel)...\"\
      \nmkdir -p /local_shards\nt0=$(date +%s)\ngcloud storage cp 'gs://omega-pure-data/wds_shards_v3_full/omega_shard_*.tar'\
      \ /local_shards/\nt1=$(date +%s)\nn=$(ls /local_shards/*.tar | wc -l)\necho\
      \ \"Staged $n shards in $((t1-t0))s\"\npython3 /app/phase7_inference.py \\\n\
      \  --checkpoint=/gcs/omega-pure-data/checkpoints/phase6_icloss/trial_29/best.pt\
      \ \\\n  --shard_dir=/local_shards \\\n  --date_map=/gcs/omega-pure-data/phase7/shard_date_map.json\
      \ \\\n  --output=/gcs/omega-pure-data/phase7/predictions.parquet \\\n  --hidden_dim=64\
      \ --window_size_t=32 --batch_size=512 \\\n  --checkpoint_interval=100 --prefetch=4\n"
