workerPoolSpecs:
- machineSpec:
    machineType: a2-highgpu-1g
    acceleratorType: NVIDIA_TESLA_A100
    acceleratorCount: 1
  replicaCount: 1
  diskSpec:
    bootDiskType: pd-ssd
    bootDiskSizeGb: 100
  containerSpec:
    imageUri: us-central1-docker.pkg.dev/gen-lang-client-0250995579/omega-training/omega-tib:phase7-v16
    command:
    - python3
    - /app/phase7_inference.py
    args:
    - --checkpoint=/gcs/omega-pure-data/checkpoints/phase6_icloss/trial_29/best.pt
    - --shard_dir=gs://omega-pure-data/wds_shards_v3_full
    - --date_map=/gcs/omega-pure-data/phase7/shard_date_map.json
    - --output=/gcs/omega-pure-data/phase7/predictions.parquet
    - --hidden_dim=64
    - --window_size_t=32
    - --batch_size=1024
    - --checkpoint_interval=50
    - --prefetch=8
scheduling:
  strategy: SPOT
