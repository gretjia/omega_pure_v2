# Phase 9 Training Config v3 — Fat Node + Local SSD + On-demand
# Gemini recommendation: 556GB data → 750GB Local SSD, all I/O local
# No Spot (eliminates preemption during validation)
# Validation 15min → 1-2min (NVMe vs GCS pipe)
workerPoolSpecs:
- machineSpec:
    machineType: g2-standard-8
    acceleratorType: NVIDIA_L4
    acceleratorCount: 1
  replicaCount: 1
  diskSpec:
    bootDiskType: pd-ssd
    bootDiskSizeGb: 800
  containerSpec:
    imageUri: us-central1-docker.pkg.dev/gen-lang-client-0250995579/omega-training/omega-tib:phase9-v2
    command:
    - bash
    - -c
    - |
      set -e
      echo "=== Stage 1: Pull data to local disk (~5 min) ==="
      mkdir -p /tmp/shards
      gcloud storage cp "gs://omega-pure-data/wds_shards_v3_full/omega_shard_*.tar" /tmp/shards/ 2>&1 | tail -5
      echo "Shards staged: $(ls /tmp/shards/*.tar | wc -l)"
      df -h /tmp

      echo "=== Stage 2: Train (20 epochs, local I/O) ==="
      PYTHONUNBUFFERED=1 python3 /app/train.py \
        --shard_dir=/tmp/shards \
        --output_dir=/gcs/omega-pure-data/checkpoints/phase9_v4_anchor01 \
        --hidden_dim=64 \
        --window_size_t=32 \
        --lr=3.2e-4 \
        --lambda_s=1e-7 \
        --warmup_epochs=2 \
        --anchor_weight=0.01 \
        --batch_size=128 \
        --coarse_graining_factor=1 \
        --downside_dampening=0.3 \
        --epochs=20 \
        --steps_per_epoch=10000 \
        --num_workers=4 \
        --no_amp \
        --ckpt_every_n_steps=500 \
        --resume
