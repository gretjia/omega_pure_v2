# Phase 14 Step 1: Phase 6 Oracle Test — T4 GPU + GCS FUSE (not pipe)
# V4 was I/O bound on pipe:gcloud — FUSE /gcs/ path is 10x+ faster
workerPoolSpecs:
- machineSpec:
    machineType: n1-standard-4
    acceleratorType: NVIDIA_TESLA_T4
    acceleratorCount: 1
  replicaCount: 1
  diskSpec:
    bootDiskType: pd-standard
    bootDiskSizeGb: 100
  containerSpec:
    imageUri: us-central1-docker.pkg.dev/gen-lang-client-0250995579/omega-training/omega-tib:phase13-v2
    command:
    - bash
    - -c
    - |
      set -e
      echo "=== Phase 14 Step 1: Phase 6 Oracle (T4 + FUSE) ==="

      gcloud storage cp gs://omega-pure-data/scripts/phase6_oracle_test.py /app/phase6_oracle_test.py

      PYTHONUNBUFFERED=1 python3 /app/phase6_oracle_test.py \
        --checkpoint /gcs/omega-pure-data/checkpoints/phase6_icloss/trial_29/best.pt \
        --shard_dir /gcs/omega-pure-data/wds_shards_v3_full \
        --output_dir /gcs/omega-pure-data/phase14_results \
        --window_size_t 32 \
        --window_size_s 10 \
        --hidden_dim 64 \
        --batch_size 512 \
        --skip_step0

      echo "=== Done. Results: gs://omega-pure-data/phase14_results/phase14_step0_step1.json ==="
scheduling:
  strategy: ON_DEMAND
