# Phase 10 Vanguard V5 — Softmax Portfolio Loss (On-demand + Local Staging)
# Strategy: gcloud storage cp 556GB → pd-ssd /tmp/shards (~5min), then 20 epochs local I/O
# pd-ssd 800GB: 384 MB/s read, sufficient for 19.7K model (I/O > compute)
workerPoolSpecs:
- machineSpec:
    machineType: g2-standard-8
    acceleratorType: NVIDIA_L4
    acceleratorCount: 1
  replicaCount: 1
  diskSpec:
    bootDiskType: pd-ssd
    bootDiskSizeGb: 800
  containerSpec:
    imageUri: us-central1-docker.pkg.dev/gen-lang-client-0250995579/omega-training/omega-tib:phase10-v5
    command:
    - bash
    - -c
    - |
      set -e
      echo "=== Phase 10 Vanguard V5: Softmax Portfolio Loss ==="
      echo "=== Stage 1: Pull data to local pd-ssd (~5 min) ==="
      mkdir -p /tmp/shards
      t0=$(date +%s)
      gcloud storage cp "gs://omega-pure-data/wds_shards_v3_full/omega_shard_*.tar" /tmp/shards/ 2>&1 | tail -5
      t1=$(date +%s)
      echo "Staged $(ls /tmp/shards/*.tar | wc -l) shards in $((t1-t0))s"
      df -h /tmp

      echo "=== Stage 2: Train (20 epochs, local I/O) ==="
      PYTHONUNBUFFERED=1 python3 /app/train.py \
        --shard_dir=/tmp/shards \
        --output_dir=/gcs/omega-pure-data/checkpoints/phase10_softmax_v5 \
        --hidden_dim=64 \
        --window_size_t=32 \
        --lr=3.2e-4 \
        --lambda_s=1e-7 \
        --warmup_epochs=2 \
        --temperature=1.0 \
        --l2_weight=1e-4 \
        --batch_size=256 \
        --coarse_graining_factor=1 \
        --epochs=20 \
        --steps_per_epoch=10000 \
        --num_workers=6 \
        --no_amp \
        --ckpt_every_n_steps=500 \
        --resume
