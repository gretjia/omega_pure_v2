# Phase 15 Step 1: Training Stabilization
# Changes vs Phase 13: grad_accum=16, EMA, embargo_shards=2
# Plan: architect/directives/2026-04-06_phase15_pipeline_stabilization.md V2
workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-8
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: gcr.io/gen-lang-client-0250995579/omega-tib:phase15-v1
      args:
        - --shard_dir=gs://omega-pure-data/wds_shards_v3_full
        - --output_dir=/gcs/omega-pure-data/checkpoints/phase15_step1
        - --epochs=15
        - --steps_per_epoch=4992
        - --batch_size=256
        - --lr=3e-4
        - --hidden_dim=64
        - --window_size_t=32
        - --window_size_s=10
        - --lambda_s=0
        - --mask_prob=0.0
        - --no_amp
        - --seed=42
        - --grad_accum=16
        - --ema_start_epoch=10
        - --ema_decay=0.999
        - --ema_lr=3e-5
        - --embargo_shards=2
        - --ckpt_every_n_steps=500
        - --model_type=omega
scheduling:
  strategy: ON_DEMAND
