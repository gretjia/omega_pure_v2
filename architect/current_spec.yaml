# OMEGA PURE 架构规范 — 由架构师联络官维护
# 最后更新：2026-04-04
# 更新来源：INS-065~073 (Phase 13 Audit V2 + Joint Arbitration V3)
# [FINAL — Codex 9/9 + Gemini 7/7 + Architect GREEN LIGHT + Crucible PASS, 2026-04-04]
# 源文档：Google Docs id.1~id.6 (archived at architect/gdocs/)
# 审计裁决：V2 (audit_verdict_and_roadmap_v2) + V3 (recursive_audit_and_joint_arbitration)
# 范式：INS-071 双轨制 — Volume Clock 训练 (batch-level IC) + Calendar 严格评估 (per-date)
# 基线：INS-072 Phase 6 及所有历史基线已作废，Phase 13 = Epoch 0

version: v3

# ============================================================
# 张量规范 (updated per id6: V_D physics ruling)
# ============================================================
tensor:
  shape: [B, 160, 10, 10]
  time_axis: 160        # Volume-Clock lags (ACF衰减上限, ~3天宏观建仓周期)
  spatial_axis: 10      # LOB 深度档位 (10个价格层级, 每层含Bid+Ask配对, 绝不可拍扁为1D)
  feature_axis: 10      # 扩展自7→10, 通道定义见下

# Feature Channel Contract (id6 hotfix):
# Ch 0: Bid_P      — 买价 (静态盘口快照)
# Ch 1: Bid_V      — 买量 (静态盘口, 供 TDA 提取阻力墙, 不参与 SRL 分母)
# Ch 2: Ask_P      — 卖价
# Ch 3: Ask_V      — 卖量
# Ch 4: Close      — 收盘价
# Ch 5: reserved — 预留 (原始 parquet 无此字段, ETL 写 0.0, SRL 在模型内部计算)
# Ch 6: reserved — 预留 (原始 parquet 无此字段, ETL 写 0.0, Epiplexity 是模型 z_core 输出)
# Ch 7: delta_p    — 微观价格冲击 ΔP = last_tick.price - first_tick.price (per volume bar)
# Ch 8: macro_v_d  — 宏观日均成交量 (20-day Rolling ADV, 广播到所有空间深度)
# Ch 9: macro_sigma_d — 宏观日均波动率 (20-day Rolling ATR = mean(high-low), 绝对价格单位, 广播到所有空间深度)

# ============================================================
# 物理常数
# ============================================================
physics:
  delta: 0.5            # Layer 1 永恒常数: 平方根法则指数 (跨所有 LOB 市场不变)
  c_default: 0.842      # Layer 2 回退值: TSE 全局中位数 (非永恒, 被 per-stock c_i 取代)
  # δ=0.5 是宇宙拓扑常数，绝不可修改
  # c 是生态摩擦系数，因市场/股票而异，必须通过实证标定
  # A股 c_i 标定方案见 architect/gdocs/id4_srl_friction_calibration.md

# ============================================================
# SRL 特异性标定 (id4: per-stock calibration)
# ============================================================
srl_calibration:
  method: "OLS without intercept: c_i = sum(X*Y) / sum(X^2)"
  metaorder_proxy: "Directional Runs (bs_flag 同向游程)"
  nondimensionalization: "Q_ratio = Q/V_D, I_ratio = ΔP/σ_D"
  output: "a_share_c_registry.json"
  physical_bounds: [0.05, 10.0]    # 异常值熔断
  fallback: "global A-share median <c>"
  prerequisite: "必须在 ETL 之前运行"

# ============================================================
# ETL 管线参数
# ============================================================
etl:
  vol_threshold: 50000  # 容量时钟阈值 (冷启动默认值)
  window_size: 160      # 最大感受野 (ACF衰减上限)
  stride: 20            # 环形缓冲区滑动步长 (平移不变性重叠采样)
  adv_fraction: 0.02    # 动态阈值 = Rolling_ADV_20d × 此值
  spatial_depth: 10     # 盘口空间深度
  feature_dim: 10       # 特征通道数 (从7扩展到10, id6 hotfix)
  shard_max_count: 5000 # 每个 .tar shard 最大样本数 (~1GB/shard)
  output_format: webdataset_tar  # manifold_2d.npy + target.npy + c_friction (float) + meta.json
  # 设计哲学: 容量时钟替代物理时钟，抹平大小盘异质性
  # 每根 Bar 严格代表 "消耗了该标的 2% 日常流动性"
  # ETL 必须维护跨文件的 symbol 状态连续性 (Codex audit fix)
  # [UPGRADE] ETL V4: 添加 date.npy 到 shard (INS-071 双轨制评估需要)
  #   原始 parquet 已有 date 字段，ETL 内部已用于日边界检测，只需写入 shard
  #   执行: windows1 并行重处理 2.2TB → gs://omega-pure-data/wds_shards_v4/

# ============================================================
# Target 定义 (id5: 架构师裁决)
# ============================================================
target:
  type: "forward_vwap_return"
  entry: "VWAP of bar N+1 (forced delay after signal at bar N)"
  exit: "VWAP of bar N+1+H"
  payoff_horizon: 20    # H bars — 固定值, 禁止进入 HPO 搜索 (INS-010: 目标劫持风险)
  unit: "basis_points"  # Y = (VWAP_exit - VWAP_entry) / VWAP_entry × 10000
  # ETL 三步法: Tick→VolumeBar(VWAP)→shift计算→SlidingWindow绑定target
  # 绝对封杀 Look-ahead Bias

# ============================================================
# 训练参数 — Phase 13 (INS-065~069, supersedes Phase 12 INS-057~064)
# [FINAL — Codex+Gemini audited 2026-04-04]
# ============================================================
training:
  target_model: Omega-TIB   # Topological Information Bottleneck
  loss: "Per-Date IC Loss (Pearson) — rank-based objective (INS-066, supersedes INS-060/062/063/064)"
  loss_function: |
    # [APPROXIMATION: batch-level IC, pending ETL date field for true per-date grouping]
    # Target: Per-date IC within each batch (Codex audit: global batch IC is UNFAITHFUL to directive)
    # Current: Batch-level Pearson IC (date not available in shard meta.json)
    # Upgrade path: ETL V4 adds date → per-date grouping as spec originally intended
    #
    # Batch-level implementation:
    pred = prediction.float().view(-1)
    tgt = target.float().view(-1)
    pred_c = pred - pred.mean()
    tgt_c = tgt - tgt.mean()
    cov = (pred_c * tgt_c).mean()
    pred_std = sqrt(mean(pred_c^2) + eps)  # NOT clamp(std, eps) — std() backward NaN at var=0
    tgt_std = sqrt(mean(tgt_c^2) + eps)
    ic = cov / (pred_std * tgt_std)
    loss = -ic  # Gemini audit: sqrt(var+eps) safe forward AND backward
  # Phase 13 Architectural Reset (External Audit Verdict 2026-04-04):
  # 1. DROP Leaky Blinding: 100x 梯度压缩导致波动率预测 (INS-065, Gemini 证明)
  # 2. DROP MSE: 高方差(190BP)低SNR(2.4%)下退化为条件均值预测 (INS-066)
  # 3. DROP Static Centering: IC Loss 平移不变，无需居中 (Gemini PASS)
  # 4. DROP L1 MDL: 2.4% SNR 下杀信号 (INS-069, Phase 12 E0>E19 实证)
  # 5. REVERT IC Loss: 排序损失理论优于MSE (INS-059→INS-072: Phase 6 数据已作废，定性仍成立)
  # 诊断链: 波动率预测(Gemini) + 条件均值退化(Codex) + 全局排序伪信号(Codex)
  # SUPERSEDED: INS-060(leaky) INS-062(MSE scale) INS-063(path A) INS-064(static mean)
  # leaky_factor: DELETED — 100x 梯度压缩致波动率预测 (INS-065)
  # static_mean_bp: DELETED — IC Loss 平移不变 (INS-066)
  # outlier_clamp_bp: DELETED from training — 移至 ETL 数据质量层 (Codex audit)
  # mse_scale_factor: DELETED — MSE 已废弃 (INS-066)
  # lambda_s: DELETED — L1 在 2.4% SNR 下杀信号 (INS-069)
  # lambda_s_warmup: DELETED — L1 已废弃 (Codex audit: meaningless without L1)
  loss_precision: "fp32"     # IC Loss 必须 FP32 (Gemini: FP16 下 std 精度不足)
  ic_epsilon: 1e-8           # [FINAL — Codex+Gemini audited 2026-04-04] std(pred) 防零除 (Gemini 强制要求)
  min_samples_per_date: 2    # [FINAL — Codex+Gemini audited 2026-04-04] IC 需至少 2 个样本
  masking:
    strategy: block_input    # 输入端 Block-wise Masking
    min_bars: 10
    max_bars: 30
    probability: 0.5
    keep_last: 5
    train_only: true
  # 串联位置: input_proj 之后、tda_layer 之前

# ============================================================
# 推理参数 — Phase 13 新增 (INS-066 + Codex audit)
# [FINAL — Codex+Gemini audited 2026-04-04]
# ============================================================
inference:
  scaling: "daily_cross_sectional_zscore"  # 每日截面 Z-Score 标准化 (解决 IC Loss 尺度问题)
  # pred_scaled = (pred - mean(pred_today)) / (std(pred_today) + eps)
  # 输出标准化后的相对排名分数，供执行层使用
  zscore_epsilon: 1e-8
  min_stocks_per_date: 50    # [FINAL — Codex+Gemini audited 2026-04-04] 少于此数的日期不出信号 (Gemini 建议)

# ============================================================
# HPO (Hyperparameter Optimization) 搜索空间
# ============================================================
# ============================================================
# HPO — Phase 13 (INS-066/067, supersedes Phase 12 HPO)
# [FINAL — Codex+Gemini audited 2026-04-04]
# ============================================================
hpo:
  engine: google_vizier              # Bayesian optimization
  infrastructure: "A100 Spot (a2-highgpu-1g), 70 trials exploit, 8 parallel"
  primary_metric: "Cross-Sectional Rank IC (Vizier MAXIMIZE, INS-067) [APPROXIMATION: global Spearman, pending per-date average when ETL adds date]"
  secondary_metric: "Cross-Sectional D9-D0 Spread (per-date, min 50 samples/date, then equal-weight average)"
  # Phase 13: IC Loss + Cross-Sectional Evaluation
  # WARNING (Codex): old global-spread thresholds NOT comparable to cross-sectional metrics
  # lambda_s: DELETED from search — fixed at 0 (INS-069)
  # warmup_epochs: DELETED — no L1 warmup needed (Codex audit)
  search_space:
    learning_rate:
      type: loguniform
      range: [1e-4, 1e-3]
    hidden_dim:
      type: choice
      values: [64, 128]
    window_size_t:
      type: choice
      values: [8, 16, 32]
    # LOCKED (not searched):
    # coarse_graining_factor: 1 (INS-016)
    # macro_window: 160 (Phase 3 validated)
    # window_size_s: 10 (full LOB depth)
    # mask_prob: 0.0 (Phase 3 baseline)
    # payoff_horizon: 20 (INS-010)
    # batch_size: 物理参数
    # lambda_s: 0 (INS-069, fixed, not searched)
  fixed_params:
    coarse_graining_factor: 1
    macro_window: 160
    window_size_s: 10
    mask_prob: 0.0
    lambda_s: 0                      # L1 disabled (INS-069)
    batch_size: 256
    epochs: 15
    steps_per_epoch: 5000
    grad_clip: 1.0
  success_criterion: "Stable monotonic positive Cross-Sectional Rank IC (threshold TBD from Phase 13 Post-Flight)"
  # [UPDATED INS-072] Phase 6 baseline INVALIDATED (C-062 torch.compile bug + D9-D0=-5.92 BP)
  # Phase 13 = Epoch 0, no historical anchor. Threshold set after first Post-Flight results.

# ============================================================
# 回测约束 (The Crucible)
# ============================================================
backtest:
  execution_delay: "N+1 bar VWAP"    # 信号触发后只能在下一根Bar的VWAP成交
  holding_horizon: "20 volume-clock bars (~0.4 avg trading days; T+1 forces min 1-day hold)"
  # 数学推导: 1 bar = 2% ADV → 50 bars/day → 20 bars = 0.4 天 (INS-022)
  # 策略定位: T+1 隔夜波段 — 捕捉主力长线建仓中的微观执行切片
  overnight_exposure: true             # T+1 强制隔夜 (物理约束，非自愿选择)
  t_plus_1_lock: true                  # A股铁律：买入当日不可卖出 (INS-023)
  limit_up_down_enforcement: true      # 涨停买不进，跌停卖不出 (INS-023)
  exit_strategy: "volume_clocked_natural_horizon + trailing_stop"
  # 退出: 20 bars 自然到期，或 trailing stop (-10%) 触发，或信号反转
  # T+1 未满足时即使触发止损也必须锁过夜，承受真实隔夜跳空
  cost_model:
    round_trip_bp: 25                  # 印花税5 + 佣金6 + 滑点7 + 冲击7
    slippage_model: "linear_impact"    # 冲击成本 ∝ 成交量/ADV
  success_criterion: "asymmetry_payoff_ratio > 3.0 AND profit_factor > 1.5"
  # INS-011 (严格日内) SUPERSEDED by INS-021/022/023
  # 原因: 模型检测主力建仓元订单惯性，T+1 隔夜享受次日溢价冲高
  board_loss_cap: true              # Cap per-trade loss at board daily limit × hold days
    # Main board: -10%/day, ChiNext/STAR: -20%/day (Phase 8 verified: Sharpe +34%)
  # Phase 8 sweep results (INS-026/027 tested, not adopted):
  #   conviction_filter: tested conv=[0,20,30] — no improvement (max_positions already binding)
  #   regime_filter: tested trailing NAV drawdown — HARMFUL (misses recovery, -11% vs +6%)
  #   Only board_loss_cap proved beneficial. Asymmetry 1.20 confirmed unreachable at IC=0.028.
  #   Root cause: execution-layer cannot overcome signal-layer limitation → Phase 9 needed.
  # Phase 10 P0 results (INS-039/045):
  #   epiplexity_gating: FAILED — all configurations worsen performance (INS-039 FAILED)
  #   Root cause: Corr(z_sparsity, |pred|)=-0.34, filtering high-entropy = filtering profit
  #   Phase 11 simulation: Top 20% / Max 50, NO gating (standard cross-sectional, gating disabled)
  # Phase 11 acceptance targets:
  #   PRIMARY: Val Std_yhat (locked_logits) ≈ 1.0 (方差之枷验证)
  #   SECONDARY: Asymmetry > 1.30 (Phase 10 baseline) AND z_sparsity-IC correlation > 0 (扭转)

# ============================================================
# 模型架构层级 (Omega-TIB)
# ============================================================
# ============================================================
# 模型架构 — Phase 13 (INS-068, supersedes Phase 12 topology)
# [FINAL — Codex+Gemini audited 2026-04-04]
# ============================================================
model_architecture:
  name: Omega-TIB
  layer_1_physics: AxiomaticSRLInverter
    # 接受 c_friction (per-stock) 作为输入，不再硬编码 c
    # 从 x_2d 通道 7(ΔP), 8(V_D), 9(σ_D) 提取物理量
    # Q_hidden = sign(ΔP) × (|ΔP| / (c_i × σ_D))^2 × V_D
  layer_2_topology: FiniteWindowTopologicalAttention
    # 原生2D窗口注意力, 绝对禁止1D Flatten, O(1)寻址
    # [FINAL — Crucible PASS IC=0.88, Architect GREEN LIGHT 2026-04-04] (INS-068)
    #   Pre-LN 残差: out = x + tda(LayerNorm(x))
    #   Pre-LN 格式 (Gemini 强制: 防残差流方差爆炸)
    #   RPB 梯度: Phase 12 grad_norm=0.08 (死亡), Phase 13 间接证据 IC=0.88 暗示恢复
    #   建议: 正式训练加逐参数 grad_norm 监控以直接验证 RPB 恢复
    # [DEFERRED Phase 14] 跨窗注意力打破 0.64 天感受野限制 (INS-070, deferred by INS-073)
    #   当前 5×32-bar 隔离窗口 → Swin-style shifted window 或 cross-window attention
    #   Phase 13 范围降级为日内 TWAP/VWAP 拆单摩擦 (0.64天感受野足够)
    #   理由: 控制变量法 — Phase 13 已改 5 个变量，再加窗口拓扑=归因灾难
  layer_3_compression: EpiplexityBottleneck
    # 信息瓶颈 (dim → dim/2 → dim/4)
    # [FINAL — Crucible PASS, Architect GREEN LIGHT] L1 MDL 移除 (INS-069)，瓶颈仅做隐式压缩
  layer_4_pooling: AttentionPooling
    # [FINAL — Crucible PASS IC=0.88, Architect GREEN LIGHT] 替换 Global Mean Pooling (INS-068)
    # AttentionPooling: pool = sum(softmax(z @ W_pool / sqrt(D)) * z, dim=tokens)
    # +64 新参数 (Gemini 推荐, Flatten+Linear FAIL: +25.6K 过拟合)
  layer_5_prediction: IntentDecoder
    # AttentionPooling 输出 → 标量意图预测
