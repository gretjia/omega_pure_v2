# OMEGA PURE 架构规范 — 由架构师联络官维护
# 最后更新：2026-03-29
# 更新来源：INS-019/020/021/022/023 (压缩即智能正名 + 时空修正 + Phase 7 Go-Live)
# 源文档：Google Docs id.1~id.6 (archived at architect/gdocs/)

version: v3

# ============================================================
# 张量规范 (updated per id6: V_D physics ruling)
# ============================================================
tensor:
  shape: [B, 160, 10, 10]
  time_axis: 160        # Volume-Clock lags (ACF衰减上限, ~3天宏观建仓周期)
  spatial_axis: 10      # LOB 深度档位 (10个价格层级, 每层含Bid+Ask配对, 绝不可拍扁为1D)
  feature_axis: 10      # 扩展自7→10, 通道定义见下

# Feature Channel Contract (id6 hotfix):
# Ch 0: Bid_P      — 买价 (静态盘口快照)
# Ch 1: Bid_V      — 买量 (静态盘口, 供 TDA 提取阻力墙, 不参与 SRL 分母)
# Ch 2: Ask_P      — 卖价
# Ch 3: Ask_V      — 卖量
# Ch 4: Close      — 收盘价
# Ch 5: reserved — 预留 (原始 parquet 无此字段, ETL 写 0.0, SRL 在模型内部计算)
# Ch 6: reserved — 预留 (原始 parquet 无此字段, ETL 写 0.0, Epiplexity 是模型 z_core 输出)
# Ch 7: delta_p    — 微观价格冲击 ΔP = last_tick.price - first_tick.price (per volume bar)
# Ch 8: macro_v_d  — 宏观日均成交量 (20-day Rolling ADV, 广播到所有空间深度)
# Ch 9: macro_sigma_d — 宏观日均波动率 (20-day Rolling ATR = mean(high-low), 绝对价格单位, 广播到所有空间深度)

# ============================================================
# 物理常数
# ============================================================
physics:
  delta: 0.5            # Layer 1 永恒常数: 平方根法则指数 (跨所有 LOB 市场不变)
  c_default: 0.842      # Layer 2 回退值: TSE 全局中位数 (非永恒, 被 per-stock c_i 取代)
  # δ=0.5 是宇宙拓扑常数，绝不可修改
  # c 是生态摩擦系数，因市场/股票而异，必须通过实证标定
  # A股 c_i 标定方案见 architect/gdocs/id4_srl_friction_calibration.md

# ============================================================
# SRL 特异性标定 (id4: per-stock calibration)
# ============================================================
srl_calibration:
  method: "OLS without intercept: c_i = sum(X*Y) / sum(X^2)"
  metaorder_proxy: "Directional Runs (bs_flag 同向游程)"
  nondimensionalization: "Q_ratio = Q/V_D, I_ratio = ΔP/σ_D"
  output: "a_share_c_registry.json"
  physical_bounds: [0.05, 10.0]    # 异常值熔断
  fallback: "global A-share median <c>"
  prerequisite: "必须在 ETL 之前运行"

# ============================================================
# ETL 管线参数
# ============================================================
etl:
  vol_threshold: 50000  # 容量时钟阈值 (冷启动默认值)
  window_size: 160      # 最大感受野 (ACF衰减上限)
  stride: 20            # 环形缓冲区滑动步长 (平移不变性重叠采样)
  adv_fraction: 0.02    # 动态阈值 = Rolling_ADV_20d × 此值
  spatial_depth: 10     # 盘口空间深度
  feature_dim: 10       # 特征通道数 (从7扩展到10, id6 hotfix)
  shard_max_count: 5000 # 每个 .tar shard 最大样本数 (~1GB/shard)
  output_format: webdataset_tar  # manifold_2d.npy + target.npy + c_friction (float) + meta.json
  # 设计哲学: 容量时钟替代物理时钟，抹平大小盘异质性
  # 每根 Bar 严格代表 "消耗了该标的 2% 日常流动性"
  # ETL 必须维护跨文件的 symbol 状态连续性 (Codex audit fix)

# ============================================================
# Target 定义 (id5: 架构师裁决)
# ============================================================
target:
  type: "forward_vwap_return"
  entry: "VWAP of bar N+1 (forced delay after signal at bar N)"
  exit: "VWAP of bar N+1+H"
  payoff_horizon: 20    # H bars — 固定值, 禁止进入 HPO 搜索 (INS-010: 目标劫持风险)
  unit: "basis_points"  # Y = (VWAP_exit - VWAP_entry) / VWAP_entry × 10000
  # ETL 三步法: Tick→VolumeBar(VWAP)→shift计算→SlidingWindow绑定target
  # 绝对封杀 Look-ahead Bias

# ============================================================
# 训练参数 (id5: Omega-TIB paradigm)
# ============================================================
training:
  target_model: Omega-TIB   # Topological Information Bottleneck (正名自 SpatioTemporal2DMAE)
  loss: "Leaky Asymmetric IC Loss + Dampened MSE anchor + MDL (INS-018 + INS-030)"
  loss_function: "1 - Pearson_IC(pred, asym_target) + anchor_weight * MSE(pred, asym_target_z) + lambda_s * ||z_core||_1"
  downside_dampening: 0.05   # INS-030: target<0 乘以 0.05 (95% upside focus, 5% leaky gradient)
  # Phase 7-8 证明对称 Pearson → asymmetry 上限 1.2 (数学不可达 3.0)
  # Gemini audit: anchor 也必须 dampen (finding #4: MSE 否则在负尾反客为主)
  lambda_s: 0.001            # Phase 3 值; Phase 6 搜索 [1e-7, 1e-4]
  lambda_s_warmup: 2         # Phase 3 值; Phase 6 搜索 [2, 3, 5]
  anchor_weight: 0.01        # Phase 6 搜索 [1e-4, 1e-3, 1e-2, 1e-1] (INS-018)
  masking:
    strategy: block_input    # 输入端 Block-wise Masking (非 MAE 输出重构)
    min_bars: 10             # 最小遮蔽长度
    max_bars: 30             # 最大遮蔽长度
    probability: 0.5         # 训练时 50% 概率触发
    keep_last: 5             # 保留最后 5 根 Bar 不遮蔽 (触警现状)
    train_only: true         # 只在 model.train() 模式生效
  # 串联位置: input_proj 之后、tda_layer 之前
  # 目的: 斩断局部线性插值退路，逼迫跨期因果推理

# ============================================================
# HPO (Hyperparameter Optimization) 搜索空间
# ============================================================
hpo:
  engine: google_vizier              # Bayesian optimization
  infrastructure: "A100 Spot (a2-highgpu-1g), 70 trials exploit, 8 parallel (INS-018 Phase 6)"
  metric: "1-IC (Pearson correlation, reported as best_val_fvu for Vizier compat)"
  # IC > 0.05 = Alpha confirmed, Phase 5a Spread > 8 BP = tradeable
  # Phase 6 搜索空间 (INS-018: IC Loss 横截面相对论)
  search_space:
    learning_rate:                   # IC Loss 梯度量级不同于 Huber
      type: loguniform
      range: [1e-4, 1e-3]
    lambda_s:                        # 扩展到 1e-7 (IC Loss 梯度更小，需更弱 MDL)
      type: loguniform
      range: [1e-7, 1e-4]
    warmup_epochs:                   # Gemini audit: [2,3,5] 配合 epochs=15
      type: choice
      values: [2, 3, 5]
    hidden_dim:                      # 新增 64 测试小模型效率
      type: choice
      values: [64, 128, 256]
    window_size_t:                   # 保持 RECON 范围
      type: choice
      values: [8, 16, 32]
    batch_size:                      # 新增: IC Loss 截面统计稳定性
      type: choice
      values: [128, 256, 512]
    anchor_weight:                   # 新增: MSE 锚点强度 (Gemini: >=1e-4, FP16 安全)
      type: choice
      values: [0.0001, 0.001, 0.01, 0.1]
    # LOCKED (not searched):
    # coarse_graining_factor: 1 (INS-016: Volume-Clock 不可二次粗粒化)
    # macro_window: 160 (Phase 3 validated)
    # window_size_s: 10 (full LOB depth)
    # mask_prob: 0.0 (Phase 3 baseline)
    # payoff_horizon: 20 (INS-010: 禁止算法选择目标)
  fixed_params:
    coarse_graining_factor: 1
    macro_window: 160
    window_size_s: 10
    mask_prob: 0.0
    epochs: 15                       # IC Loss 需要 post-MDL 稳定时间 (Vanguard V2 peak at epoch 14)
    steps_per_epoch: 5000
    grad_clip: 1.0
  success_criterion: "Top-3 trials Phase 5a Spread > 8 BP (扣 10 BP A股成本后正期望)"

# ============================================================
# 回测约束 (The Crucible)
# ============================================================
backtest:
  execution_delay: "N+1 bar VWAP"    # 信号触发后只能在下一根Bar的VWAP成交
  holding_horizon: "20 volume-clock bars (~0.4 avg trading days; T+1 forces min 1-day hold)"
  # 数学推导: 1 bar = 2% ADV → 50 bars/day → 20 bars = 0.4 天 (INS-022)
  # 策略定位: T+1 隔夜波段 — 捕捉主力长线建仓中的微观执行切片
  overnight_exposure: true             # T+1 强制隔夜 (物理约束，非自愿选择)
  t_plus_1_lock: true                  # A股铁律：买入当日不可卖出 (INS-023)
  limit_up_down_enforcement: true      # 涨停买不进，跌停卖不出 (INS-023)
  exit_strategy: "volume_clocked_natural_horizon + trailing_stop"
  # 退出: 20 bars 自然到期，或 trailing stop (-10%) 触发，或信号反转
  # T+1 未满足时即使触发止损也必须锁过夜，承受真实隔夜跳空
  cost_model:
    round_trip_bp: 25                  # 印花税5 + 佣金6 + 滑点7 + 冲击7
    slippage_model: "linear_impact"    # 冲击成本 ∝ 成交量/ADV
  success_criterion: "asymmetry_payoff_ratio > 3.0 AND profit_factor > 1.5"
  # INS-011 (严格日内) SUPERSEDED by INS-021/022/023
  # 原因: 模型检测主力建仓元订单惯性，T+1 隔夜享受次日溢价冲高
  board_loss_cap: true              # Cap per-trade loss at board daily limit × hold days
    # Main board: -10%/day, ChiNext/STAR: -20%/day (Phase 8 verified: Sharpe +34%)
  # Phase 8 sweep results (INS-026/027 tested, not adopted):
  #   conviction_filter: tested conv=[0,20,30] — no improvement (max_positions already binding)
  #   regime_filter: tested trailing NAV drawdown — HARMFUL (misses recovery, -11% vs +6%)
  #   Only board_loss_cap proved beneficial. Asymmetry 1.20 confirmed unreachable at IC=0.028.
  #   Root cause: execution-layer cannot overcome signal-layer limitation → Phase 9 needed.

# ============================================================
# 模型架构层级 (Omega-TIB)
# ============================================================
model_architecture:
  name: Omega-TIB
  layer_1_physics: AxiomaticSRLInverter
    # 接受 c_friction (per-stock) 作为输入，不再硬编码 c
    # 从 x_2d 通道 7(ΔP), 8(V_D), 9(σ_D) 提取物理量
    # Q_hidden = sign(ΔP) × (|ΔP| / (c_i × σ_D))^2 × V_D
  layer_2_topology: FiniteWindowTopologicalAttention
    # 原生2D窗口注意力, 绝对禁止1D Flatten, O(1)寻址
  layer_3_compression: EpiplexityBottleneck
    # 信息瓶颈 (dim → dim/2 → dim/4) + L1 MDL裁决
  layer_4_prediction: IntentDecoder
    # 全局池化 → 标量意图预测
