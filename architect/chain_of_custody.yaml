# chain_of_custody.yaml — Living Harness Pipeline Nervous System
#
# 每个架构师指令从诞生到部署的完整生命链。
# 当训练失败时，从 C-xxx 反向追溯到源头 INS → 找到哪个假设出错。
#
# 自动维护者:
#   - /architect-ingest: 创建条目 (stage: ingested)
#   - /dev-cycle Stage 8.5: 升级到 spec_final
#   - /deploy-cycle: 升级到 deployed
#   - /lesson-to-rule: 失败时标记 failed + 链接到 C-xxx
#   - /harness-reflect: 统计健康度

schema_version: "1.0"
last_updated: "2026-04-03"

# ── Pipeline Stage 定义 ──
# ingested → ins_created → spec_draft → spec_final → coded → audited → deployed
# 任何阶段可以标记 failed (附带 C-xxx 编号)

# ── 活跃管线 ──
pipelines:
  - directive: "2026-04-02_phase12_unshackling_protocol.md"
    stage: deployed
    insights: [INS-060, INS-063, INS-064]
    spec_fields:
      - "loss_function: Unbounded Spear"
      - "hpo.fixed_params.lambda_s: 1e-4"
    code_files: ["omega_epiplexity_plus_core.py", "train.py"]
    audit_status: final
    failures:
      - lesson: C-059
        stage_failed: coded
        root_cause: "ETL 输出单位假设错误 — INS 未记录数据格式前提"
        assumption_violated: "target 是 raw decimal (实际是 BP)"
