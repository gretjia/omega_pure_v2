    audit_status: final
    audit_overrides:
      - rejected: "path B (both centered)"
        reason: "代数消元 — 两个 -40 抵消, 优化器操控 Bias 飙升 +40"
        auditor: "Codex"
    failures: []
    last_updated: "2026-04-03"

  - directive: "2026-03-29_phase11e_moment_matched_spear.md"
    stage: coded
    insights: [INS-057, INS-058, INS-059]
    spec_fields:
      - "loss_function: Moment-Matched Spear"
      - "model.window_size: (32, 10)"
    code_files: ["omega_epiplexity_plus_core.py", "train.py"]
    audit_status: final
    failures:
      - lesson: C-057
        stage_failed: coded
        root_cause: "window_size_s=4 OOM 补丁未回退 — 代码默认值与 spec 漂移"
        assumption_violated: "代码默认值 = spec 值 (实际是早期 OOM 临时改的)"
    last_updated: "2026-04-03"

